<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --c1: #0d0d1a;
      --c2: #1a1040;
      --c3: #2d1b69;
      --accent: #a78bfa;
      --accent2: #f0abfc;
      --gold: #fbbf24;
      --text: #e2e8f0;
      --muted: #94a3b8;
    }

    html, body {
      width: 100%; height: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--c1);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Gradient background ── */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, #3b1f7a44, transparent),
        radial-gradient(ellipse 60% 50% at 80% 80%, #6d28d933, transparent),
        radial-gradient(ellipse 50% 40% at 60% 30%, #be185d22, transparent),
        linear-gradient(160deg, #0d0d1a 0%, #1a1040 50%, #0d0d1a 100%);
      animation: bgShift 12s ease-in-out infinite alternate;
    }
    @keyframes bgShift {
      0%   { filter: hue-rotate(0deg) brightness(1); }
      100% { filter: hue-rotate(20deg) brightness(1.08); }
    }

    /* floating orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.25;
      animation: float linear infinite;
      z-index: 0;
      pointer-events: none;
    }
    .orb1 { width: 320px; height: 320px; background: #7c3aed; top: -80px; left: -80px; animation-duration: 18s; }
    .orb2 { width: 260px; height: 260px; background: #db2777; bottom: 10%; right: -60px; animation-duration: 14s; animation-direction: reverse; }
    .orb3 { width: 180px; height: 180px; background: #0891b2; bottom: 30%; left: 10%; animation-duration: 22s; }
    @keyframes float {
      0%   { transform: translateY(0) scale(1); }
      50%  { transform: translateY(-40px) scale(1.05); }
      100% { transform: translateY(0) scale(1); }
    }

    /* ── Page layout ── */
    .page {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 640px;
      min-height: 100vh;
      padding: 0 1.5rem 4rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ── Hero card ── */
    .hero {
      width: 100%;
      margin-top: clamp(4rem, 12vh, 8rem);
      padding: clamp(2rem, 6vw, 3.5rem) clamp(1.5rem, 6vw, 3rem);
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      backdrop-filter: blur(20px);
      text-align: center;
      animation: fadeUp 1s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .badge {
      display: inline-block;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.68rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(167,139,250,0.1);
      border: 1px solid rgba(167,139,250,0.25);
      padding: 0.3em 1em;
      border-radius: 100px;
      margin-bottom: 1.8rem;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.6rem, 8vw, 4rem);
      line-height: 1.1;
      letter-spacing: -0.01em;
      background: linear-gradient(135deg, #e2e8f0 30%, var(--accent2) 70%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1.2rem;
    }

    .sub {
      font-size: clamp(0.9rem, 2.5vw, 1rem);
      color: var(--muted);
      font-weight: 300;
      line-height: 1.7;
      max-width: 380px;
      margin: 0 auto 2rem;
    }

    .divider {
      width: 48px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      margin: 0 auto 2rem;
    }

    .visit-note {
      font-size: 0.82rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }
    .visit-note span {
      color: var(--accent2);
    }

    /* ── Game Section ── */
    .game-wrap {
      width: 100%;
      margin-top: 2.5rem;
      animation: fadeUp 1s 0.3s cubic-bezier(.22,1,.36,1) both;
    }

    .game-label {
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
      margin-bottom: 1rem;
    }

    .game-card {
      width: 100%;
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 20px;
      backdrop-filter: blur(12px);
      padding: 1.8rem 1.5rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
    }

    .game-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      font-weight: 400;
      color: var(--text);
      letter-spacing: 0.03em;
    }

    /* Dot grid game */
    .dot-game {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      width: 100%;
    }

    .score-row {
      display: flex;
      gap: 2rem;
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.06em;
    }
    .score-row strong {
      color: var(--accent2);
      font-size: 1rem;
      font-weight: 400;
    }

    #dot-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: clamp(8px, 2vw, 14px);
      width: 100%;
      max-width: 340px;
    }

    .dot {
      aspect-ratio: 1;
      border-radius: 50%;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      cursor: pointer;
      transition: transform 0.15s, background 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }
    .dot:hover {
      background: rgba(167,139,250,0.2);
      border-color: rgba(167,139,250,0.4);
      transform: scale(1.15);
    }
    .dot.lit {
      background: radial-gradient(circle at 40% 35%, var(--accent2), var(--accent));
      border-color: var(--accent);
      box-shadow: 0 0 12px var(--accent), 0 0 24px rgba(167,139,250,0.4);
      animation: pop 0.25s cubic-bezier(.34,1.56,.64,1);
    }
    .dot.wrong {
      background: radial-gradient(circle at 40% 35%, #f87171, #dc2626);
      border-color: #ef4444;
      box-shadow: 0 0 12px #ef4444;
      animation: shake 0.3s ease;
    }
    @keyframes pop  { 0% { transform: scale(0.7); } 100% { transform: scale(1); } }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }

    .game-msg {
      font-size: 0.82rem;
      color: var(--muted);
      text-align: center;
      min-height: 1.4em;
      transition: color 0.3s;
    }
    .game-msg.success { color: var(--accent2); }
    .game-msg.fail    { color: #f87171; }

    .btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(167,139,250,0.1);
      border: 1px solid rgba(167,139,250,0.3);
      padding: 0.55em 1.6em;
      border-radius: 100px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
    }
    .btn:hover {
      background: rgba(167,139,250,0.22);
      border-color: rgba(167,139,250,0.6);
      transform: translateY(-1px);
    }
    .btn:active { transform: translateY(0); }

    /* footer */
    .footer {
      position: relative; z-index: 1;
      margin-top: auto;
      padding: 2rem 0 1.2rem;
      font-size: 0.72rem;
      color: rgba(148,163,184,0.4);
      letter-spacing: 0.05em;
      text-align: center;
    }

    @media (max-width: 400px) {
      #dot-grid { grid-template-columns: repeat(6, 1fr); }
    }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <div class="page">

    <!-- Hero -->
    <div class="hero">
      <div class="badge">Status · Launching Soon</div>
      <h1>We'll Be<br>Online Soon</h1>
      <div class="divider"></div>
      <p class="sub">Something beautiful is on its way. We're crafting an experience worth the wait.</p>
      <p class="visit-note">Thanks for visiting — <span>we see you ✦</span></p>
    </div>

    <!-- Game -->
    <div class="game-wrap">
      <p class="game-label">— while you wait —</p>
      <div class="game-card">
        <div class="game-title">Catch the Glow</div>

        <div class="dot-game">
          <div class="score-row">
            <div>Score&nbsp;<strong id="score">0</strong></div>
            <div>Best&nbsp;<strong id="best">0</strong></div>
            <div>Time&nbsp;<strong id="timer">15</strong>s</div>
          </div>

          <div id="dot-grid"></div>

          <p class="game-msg" id="msg">Tap the glowing dot before it moves!</p>
          <button class="btn" id="startBtn" onclick="startGame()">Start Game</button>
        </div>
      </div>
    </div>

  </div>

  <div class="footer">© 2026 · All rights reserved</div>

  <script>
    // ── Dot Grid Game ──────────────────────────────────────────────
    const COLS = 7, ROWS = 4, TOTAL = COLS * ROWS;
    const grid = document.getElementById('dot-grid');
    const scoreEl = document.getElementById('score');
    const bestEl  = document.getElementById('best');
    const timerEl = document.getElementById('timer');
    const msgEl   = document.getElementById('msg');
    const startBtn = document.getElementById('startBtn');

    let dots = [], activeDot = -1, score = 0, best = 0;
    let interval = null, countdown = null, timeLeft = 15;
    let speed = 900, running = false;

    // Build grid
    for (let i = 0; i < TOTAL; i++) {
      const d = document.createElement('div');
      d.className = 'dot';
      d.dataset.i = i;
      d.addEventListener('click', () => handleClick(i));
      grid.appendChild(d);
      dots.push(d);
    }

    function startGame() {
      score = 0; timeLeft = 15; speed = 900;
      scoreEl.textContent = 0;
      timerEl.textContent = 15;
      msgEl.textContent = 'Tap the glowing dot!';
      msgEl.className = 'game-msg';
      startBtn.style.display = 'none';
      running = true;
      clearAll();
      lightRandom();

      interval = setInterval(() => {
        if (!running) return;
        // dot moved away = miss
        clearAll(); lightRandom();
        speed = Math.max(300, speed - 20);
        clearInterval(interval);
        interval = setInterval(arguments.callee, speed);
      }, speed);

      countdown = setInterval(() => {
        timeLeft--;
        timerEl.textContent = timeLeft;
        if (timeLeft <= 0) endGame();
      }, 1000);
    }

    function lightRandom() {
      let next;
      do { next = Math.floor(Math.random() * TOTAL); } while (next === activeDot);
      activeDot = next;
      dots[activeDot].classList.add('lit');
    }

    function clearAll() {
      dots.forEach(d => d.classList.remove('lit', 'wrong'));
      activeDot = -1;
    }

    function handleClick(i) {
      if (!running) return;
      if (i === activeDot) {
        score++;
        scoreEl.textContent = score;
        dots[i].classList.remove('lit');
        dots[i].classList.add('lit'); // re-trigger pop
        msgEl.textContent = '✦ Nice!';
        msgEl.className = 'game-msg success';
        clearInterval(interval);
        clearAll();
        lightRandom();
        speed = Math.max(300, speed - 15);
        interval = setInterval(() => {
          clearAll(); lightRandom();
          speed = Math.max(300, speed - 15);
          clearInterval(interval);
          interval = setInterval(arguments.callee, speed);
        }, speed);
      } else {
        dots[i].classList.add('wrong');
        msgEl.textContent = '✕ Wrong dot!';
        msgEl.className = 'game-msg fail';
        setTimeout(() => dots[i].classList.remove('wrong'), 400);
      }
    }

    function endGame() {
      running = false;
      clearInterval(interval);
      clearInterval(countdown);
      clearAll();
      if (score > best) { best = score; bestEl.textContent = best; }
      msgEl.textContent = score >= 15
        ? `🎉 Amazing! You got ${score} — you're a natural!`
        : score >= 8
        ? `✦ ${score} points — not bad at all!`
        : `You scored ${score}. Give it another shot!`;
      msgEl.className = 'game-msg success';
      startBtn.textContent = 'Play Again';
      startBtn.style.display = '';
    }
  </script>
</body>
</html>
